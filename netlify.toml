# Netlify Configuration

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["netlify/functions/*.ts"]
  external_node_modules = []
  [functions.bundler]
    external_modules = ["@neondatabase/serverless", "@neondatabase/serverless-pg", "jsonwebtoken", "bcryptjs", "axios", "date-fns"]
    format = "cjs"
    minify = true
    sourcemap = false

[build.environment]
  NODE_VERSION = "22"
  VITE_API_URL = "/.netlify/functions"
  NPM_CONFIG_PRODUCTION = "false"
  NETLIFY_USE_YARN = "false"

[dev]
  command = "npm run dev -- --port 5173 --host"
  port = 8896
  targetPort = 5173
  autoLaunch = false
  functions = "netlify/functions"
  framework = "#static"

[context.production.environment]
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

[context.deploy-preview.environment]
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

[context.branch-deploy.environment]
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

[context.beta]
  command = "npm run build"
  environment = { FEATURE_FLAGS = "mobileUXV2:100", ANALYTICS_ENV = "beta" }

[context.staging]
  environment = { FEATURE_FLAGS = "mobileUXV2:50", ANALYTICS_ENV = "staging" }

[build.processing]
  skip_processing = false
  processing_css = true
  processing_js = true
  processing_images = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers - hide technology stack
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Remove server identification headers
    Server = ""

# Cache headers for assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache HTML - always get fresh version
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

